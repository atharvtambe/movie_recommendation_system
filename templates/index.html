<!DOCTYPE html>
<html>

<head>
    <title>Movie Recommender</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

    <div class="container">

        <h1>🎬 Movie Recommendation System</h1>

        <form method="POST">

            <select name="movie">

                {% for movie in movies %}

                <option value="{{ movie }}">
                    {{ movie }}
                </option>

                {% endfor %}

            </select>

            <button type="submit">
                Show Recommendations
            </button>

        </form>

        {% if recommendations %}

        <h2>Recommended Movies</h2>

        <div class="recommendations">

            {% for movie in recommendations %}

            <div class="movie-card">
                {{ movie }}
            </div>

            {% endfor %}

        </div>

        {% endif %}

    </div>

</body>
</html>
