<!DOCTYPE html>
<html>
<head>
    <title>Movie Recommendation System</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<nav class="navbar">

    <div class="logo">
        TAMBE
    </div>

    <a href="/logout" class="logout-btn">
        Logout
    </a>

</nav>

<div class="container">

    <div class="hero">
        <h1>🎬 Movie Recommendation System</h1>
        <p>Find your next favorite movie</p>
    </div>

    <form method="POST" class="movie-form">

        <select name="movie">

            {% for movie in movies %}
            <option value="{{ movie }}">
                {{ movie }}
            </option>
            {% endfor %}

        </select>

        <button type="submit">
            Recommend
        </button>

    </form>

    {% if recommendations %}

    <h2 class="recommendation-title">
        Recommended Movies
    </h2>

    <div class="movie-grid">

        {% for movie in recommendations %}

        <div class="movie-card">

            <img src="https://via.placeholder.com/300x450"
                 class="movie-poster">

            <div class="movie-info">
                <h3>{{ movie }}</h3>
            </div>

        </div>

        {% endfor %}

    </div>

    {% endif %}

</div>

</body>
</html>
